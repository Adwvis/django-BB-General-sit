{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>پنل دسترسی‌ها</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --secondary: #06b6d4;
            --surface: rgba(255, 255, 255, 0.09);
            --surface-hover: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --danger: #fb7185;
            --danger-dark: #e11d48;
            --shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            color-scheme: dark;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            font-family: "Vazirmatn", sans-serif;
            color: var(--text-primary);
            background:
                radial-gradient(circle at 10% 20%, rgba(124, 58, 237, 0.35), transparent 30%),
                radial-gradient(circle at 90% 15%, rgba(6, 182, 212, 0.25), transparent 28%),
                radial-gradient(circle at 80% 90%, rgba(236, 72, 153, 0.2), transparent 30%),
                linear-gradient(135deg, #080c1b 0%, #11152a 45%, #15102b 100%);
        }

        body::before,
        body::after {
            position: fixed;
            z-index: -1;
            width: 350px;
            height: 350px;
            content: "";
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.35;
            pointer-events: none;
            animation: float 10s ease-in-out infinite alternate;
        }

        body::before {
            top: -120px;
            right: -80px;
            background: #7c3aed;
        }

        body::after {
            bottom: -150px;
            left: -100px;
            background: #0891b2;
            animation-delay: -4s;
        }

        .page-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .dashboard {
            width: min(100%, 1050px);
            padding: clamp(24px, 5vw, 54px);
            overflow: hidden;
            position: relative;
            background: rgba(13, 18, 39, 0.7);
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            animation: dashboardEnter 0.7s cubic-bezier(.2, .8, .2, 1);
        }

        .dashboard::before {
            position: absolute;
            top: 0;
            right: 10%;
            left: 10%;
            height: 1px;
            content: "";
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.8),
                transparent
            );
        }

        .header {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 38px;
        }

        .header-icon {
            display: grid;
            flex: 0 0 64px;
            width: 64px;
            height: 64px;
            place-items: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 15px 35px rgba(124, 58, 237, 0.35);
        }

        .header-icon svg {
            width: 30px;
            height: 30px;
        }

        .header-content h1 {
            margin-bottom: 6px;
            font-size: clamp(1.45rem, 4vw, 2.15rem);
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-content p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.9;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            list-style: none;
        }

        .link-item {
            min-width: 0;
            animation: cardEnter 0.6s ease both;
            animation-delay: calc(var(--index, 0) * 70ms);
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 15px;
            min-height: 92px;
            padding: 18px;
            position: relative;
            overflow: hidden;
            color: var(--text-primary);
            text-decoration: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            transition:
                transform 0.3s ease,
                background 0.3s ease,
                border-color 0.3s ease,
                box-shadow 0.3s ease;
        }

        .link-card::before {
            position: absolute;
            inset: 0;
            content: "";
            opacity: 0;
            background: linear-gradient(
                115deg,
                transparent 30%,
                rgba(255, 255, 255, 0.12),
                transparent 70%
            );
            transform: translateX(70%);
            transition: transform 0.6s ease, opacity 0.4s ease;
        }

        .link-card:hover {
            border-color: rgba(167, 139, 250, 0.55);
            background: var(--surface-hover);
            box-shadow: 0 16px 35px rgba(0, 0, 0, 0.22);
            transform: translateY(-5px);
        }

        .link-card:hover::before {
            opacity: 1;
            transform: translateX(-70%);
        }

        .link-icon {
            display: grid;
            flex: 0 0 48px;
            width: 48px;
            height: 48px;
            place-items: center;
            color: #ddd6fe;
            border-radius: 15px;
            background: linear-gradient(
                135deg,
                rgba(124, 58, 237, 0.35),
                rgba(6, 182, 212, 0.2)
            );
            border: 1px solid rgba(167, 139, 250, 0.25);
        }

        .link-icon svg {
            width: 23px;
            height: 23px;
        }

        .link-details {
            min-width: 0;
            flex: 1;
        }

        .link-label {
            display: block;
            overflow: hidden;
            margin-bottom: 5px;
            font-size: 1rem;
            font-weight: 700;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .link-caption {
            display: block;
            color: var(--text-secondary);
            font-size: 0.78rem;
        }

        .arrow {
            display: grid;
            flex: 0 0 34px;
            width: 34px;
            height: 34px;
            place-items: center;
            color: var(--primary-light);
            border-radius: 11px;
            background: rgba(255, 255, 255, 0.06);
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .arrow svg {
            width: 18px;
            height: 18px;
        }

        .link-card:hover .arrow {
            background: rgba(124, 58, 237, 0.25);
            transform: translateX(-4px);
        }

        .empty-state {
            grid-column: 1 / -1;
            padding: 50px 20px;
            color: var(--text-secondary);
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 22px;
        }

        .empty-icon {
            display: grid;
            width: 70px;
            height: 70px;
            margin: 0 auto 18px;
            place-items: center;
            color: var(--primary-light);
            border-radius: 22px;
            background: rgba(124, 58, 237, 0.15);
        }

        .empty-icon svg {
            width: 32px;
            height: 32px;
        }

        .empty-state strong {
            display: block;
            margin-bottom: 7px;
            color: var(--text-primary);
            font-size: 1.05rem;
        }

        .footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-top: 36px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-note {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.8);
        }

        .logout-form {
            margin: 0;
        }

        .logout-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            min-width: 120px;
            padding: 12px 20px;
            cursor: pointer;
            color: #fecdd3;
            font: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            border: 1px solid rgba(251, 113, 133, 0.3);
            border-radius: 14px;
            background: rgba(244, 63, 94, 0.1);
            transition:
                color 0.25s ease,
                background 0.25s ease,
                border-color 0.25s ease,
                transform 0.25s ease,
                box-shadow 0.25s ease;
        }

        .logout-button svg {
            width: 19px;
            height: 19px;
        }

        .logout-button:hover {
            color: #fff;
            border-color: var(--danger);
            background: linear-gradient(135deg, var(--danger-dark), var(--danger));
            box-shadow: 0 10px 25px rgba(225, 29, 72, 0.25);
            transform: translateY(-2px);
        }

        .logout-button:focus-visible,
        .link-card:focus-visible {
            outline: 3px solid rgba(167, 139, 250, 0.6);
            outline-offset: 3px;
        }

        @keyframes dashboardEnter {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            from {
                transform: translate3d(0, 0, 0) scale(1);
            }
            to {
                transform: translate3d(30px, 25px, 0) scale(1.12);
            }
        }

        @media (max-width: 600px) {
            .page-wrapper {
                padding: 16px;
            }

            .dashboard {
                padding: 25px 18px;
                border-radius: 24px;
            }

            .header {
                align-items: flex-start;
                margin-bottom: 28px;
            }

            .header-icon {
                flex-basis: 54px;
                width: 54px;
                height: 54px;
                border-radius: 17px;
            }

            .links-grid {
                grid-template-columns: 1fr;
            }

            .footer {
                flex-direction: column;
                align-items: stretch;
            }

            .footer-note {
                justify-content: center;
            }

            .logout-button {
                width: 100%;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <main class="page-wrapper">
        <section class="dashboard">
            <header class="header">
                <div class="header-icon" aria-hidden="true">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.8"
                    >
                        <rect x="3" y="3" width="7" height="7" rx="2"></rect>
                        <rect x="14" y="3" width="7" height="7" rx="2"></rect>
                        <rect x="3" y="14" width="7" height="7" rx="2"></rect>
                        <rect x="14" y="14" width="7" height="7" rx="2"></rect>
                    </svg>
                </div>

                <div class="header-content">
                    <h1>Pages</h1>
                    <!-- <p>برای ورود به هر بخش، یکی از گزینه‌های زیر را انتخاب کنید.</p> -->
                </div>
            </header>

            <ul class="links-grid">
                {% for link in links %}
                    <li
                        class="link-item"
                        style="--index: {{ forloop.counter0 }};"
                    >
                        <a class="link-card" href="{{ link.url }}">
                            <span class="link-icon" aria-hidden="true">
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="1.8"
                                >
                                    <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h4L13 6.5h4.5A2.5 2.5 0 0 1 20 9v8.5a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 17.5z"></path>
                                </svg>
                            </span>

                            <span class="link-details">
                                <span class="link-label">{{ link.label }}</span>
                                <span class="link-caption">ورود به صفحه</span>
                            </span>

                            <span class="arrow" aria-hidden="true">
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                >
                                    <path d="M15 18l-6-6 6-6"></path>
                                </svg>
                            </span>
                        </a>
                    </li>
                {% empty %}
                    <li class="empty-state">
                        <span class="empty-icon" aria-hidden="true">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1.8"
                            >
                                <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h4L13 6.5h4.5A2.5 2.5 0 0 1 20 9v8.5a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 17.5z"></path>
                                <path d="M9 12h6"></path>
                            </svg>
                        </span>

                        <strong>No Page Found</strong>
                        <!-- <span>در حال حاضر هیچ صفحه‌ای برای شما تعریف نشده است.</span> -->
                    </li>
                {% endfor %}
            </ul>

            <footer class="footer">
                <div class="footer-note">
                    <span class="status-dot"></span>
                    <!-- <span>اتصال امن به پنل کاربری</span> -->
                </div>

                <form
                    class="logout-form"
                    method="post"
                    action="{% url 'accounts:logout' %}"
                >
                    {% csrf_token %}

                    <button class="logout-button" type="submit">
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            aria-hidden="true"
                        >
                            <path d="M10 17l5-5-5-5"></path>
                            <path d="M15 12H3"></path>
                            <path d="M15 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4"></path>
                        </svg>

                        Logout
                    </button>
                </form>
            </footer>
        </section>
    </main>
</body>
</html>
