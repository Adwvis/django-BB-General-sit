{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Admin Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #7c3aed;
            --bg-dark: #080c1b;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            background-image: radial-gradient(circle at 10% 20%, rgba(124, 58, 237, 0.1), transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.08), transparent 40%);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 2rem;
        }

        /* Glass Card */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
        }

        /* Chart Area */
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Search Input */
        #searchInput {
            width: 100%;
            padding: 12px 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            margin-bottom: 1.5rem;
        }

        /* Table Styles */
        .table-container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 1rem; color: var(--text-dim); font-weight: 500; border-bottom: 1px solid var(--glass-border); cursor: pointer; }
        td { padding: 1rem; border-bottom: 1px solid var(--glass-border); color: #e2e8f0; }
        tr:hover { background: rgba(255,255,255,0.03); }

        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            body { padding: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Charts Section -->
<div class="dashboard-grid">
    <div class="glass-card chart-box">
        <canvas id="agentsChart"></canvas>
    </div>
    <div class="glass-card chart-box">
        <canvas id="companyChart"></canvas>
    </div>
</div>


    <!-- Search Section -->
    <input type="text" id="searchInput" placeholder="Search assigned to...">

    <!-- Data Table Section -->
    <div class="table-container">
        <table id="myTable">
            <thead>
                <tr>
                    <th onclick="sortTable(0)">Assigned To ↕</th>
                    <th onclick="sortTable(1)">Total Assign ↕</th>
                    <th onclick="sortTable(2)">Reassign ↕</th>
                    <th onclick="sortTable(3)">In Issuing ↕</th>
                </tr>
            </thead>
            <tbody id="post-wrapper">
                <!-- Data will be injected here -->
            </tbody>
        </table>
    </div>
    <script src="{% static 'js/jquery-3.6.0.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.min.js' %}"></script>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script>
async function agents_Chart() {
    const res = await fetch("/accounts/api/v1/ThpIssuingPresentAgentBashbordViewSet/", {
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
    });
    const data = await res.json();

    const labels = data.map(d =>  d.person_name);
    const capacity = data.map(d => d.capacity);
    const issuing = data.map(d => d.assigned_order);

    const ctx = document.getElementById('agentsChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'Capacity', data: capacity, backgroundColor: '#9e9e9e' },
                { label: 'In Issuing', data: issuing, backgroundColor: '#800080' }
            ]
        },
        
        options: {
            plugins: {
                legend: {
                    position: 'top',
                    labels: { color: 'white' }
                },
                datalabels: {
                    anchor: 'end', align: 'top',
                    font: { size: 8 },
                    color: 'white' 
                }
            },
            scales: {
                x: {
                    ticks: {
                        autoSkip: false,
                        maxRotation: 45, minRotation: 45,
                        font: { family: 'Vazirmatn' },
                        color: 'white'
                    }
                },
                y: {
                    beginAtZero: true,
                    ticks: { color: 'white' }
                }
            }
        }
            });
        }

async function company_Chart() {
    const res = await fetch("/thirdparty/api/v1/ThpIssuingInPaidOrderBashbord/", {
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
    });
    const data = await res.json();
    console.log(data)
    const labels = data.map(d =>  d.company_name);
    const fresh = data.map(d => d.fresh);
    const secondry = data.map(d => d.secondry);

    const ctx = document.getElementById('companyChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'fresh', data: fresh, backgroundColor: '#C7FF4C' },
                { label: 'secondry', data: secondry, backgroundColor: '#B2062F' }
            ]
        },

        options: {
            plugins: {
                legend: {
                    position: 'top',
                    labels: { color: 'white' }
                },
                datalabels: {
                    anchor: 'end', align: 'top',
                    font: { size: 8 },
                    color: 'white' 
                }
            },
            scales: {
                x: {
                    ticks: {
                        autoSkip: false,
                        maxRotation: 45, minRotation: 45,
                        font: { family: 'Vazirmatn' },
                        color: 'white'
                    }
                },
                y: {
                    beginAtZero: true,
                    ticks: { color: 'white' }
                }
            }
        }
            });
        }

agents_Chart();
company_Chart();
</script>
<script>
    async function loadThpIssuingAgent() {
    try {
         // اول کمپانی‌ها رو لود کن

        const response = await fetch("/thirdparty/api/v1/ThpIssuingBashbordText/");
        if (!response.ok) throw new Error("Network response was not ok");

        const data = await response.json();
        const wrapper = document.getElementById('post-wrapper');

        wrapper.innerHTML = data.map(agent => `
            <tr>
                <td>
                <a style="text-decoration: none; color:inherit;"
                    href="/thirdparty/EditIssuingAgent/${agent.id}/">
                    <b>${agent.person_name || agent.profile_user}</b>
                </a>
                </td>
                <td>${agent.total_assign_count}</td>

                <td>${agent.reassign_count}</td>
                <td>${agent.orders_in_issuing}</td>
            </tr>
        `).join('');

    } catch (error) { console.error("Error:", error); }
}

loadThpIssuingAgent();
</script>
<script>
    let sortDirection = {};

    function sortTable(colIndex) {
        const table = document.getElementById("myTable");
        const tbody = table.tBodies[0];
        const rows = Array.from(tbody.rows);
        const headers = table.querySelectorAll("th"); // 👈 اینو اضافه کن

        // ریست همه آیکن‌ها
        headers.forEach(th => {
            const icon = th.querySelector(".sort-icon");
            if (icon) icon.textContent = "↕";
        });

        // تعیین جهت سورت
        sortDirection[colIndex] = !sortDirection[colIndex];
        const direction = sortDirection[colIndex] ? 1 : -1;

        // 👇 اینجا بذارش (بعد از تعیین direction)
        const currentIcon = headers[colIndex].querySelector(".sort-icon");
        if (currentIcon) {
            currentIcon.textContent = direction === 1 ? "↑" : "↓";
        }

        rows.sort((a, b) => {
            let valA = a.cells[colIndex].innerText.trim();
            let valB = b.cells[colIndex].innerText.trim();

            if (!isNaN(valA) && !isNaN(valB)) {
                return (valA - valB) * direction;
            }

            return valA.localeCompare(valB) * direction;
        });

        rows.forEach(row => tbody.appendChild(row));
    }
</script>
<script>
    document.getElementById("searchInput").addEventListener("keyup", function () {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll("#myTable tr");

        rows.forEach((row, index) => {
            // رد کردن هدر جدول
            if (index === 0) return;

            let text = row.textContent.toLowerCase();
            row.style.display = text.includes(filter) ? "" : "none";
        });
    });
</script>
</body>

</html>
