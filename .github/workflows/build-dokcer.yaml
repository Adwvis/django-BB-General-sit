name: Build and Publish image to Docker Hub

on:
  push:
    branches:
      - main


jobs:
  publish_image:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: build image
        run: docker build -t adwvis/django-bb-general-sit:latest .

      - name: push image to docker hub
        run: |
          docker login -u adwvis -p ${{ secrets.DOCKER_HUB_TOKEN }}
          docker push adwvis/django-bb-general-sit:latest

      - name: Deploy
        run: docker compose up -d


