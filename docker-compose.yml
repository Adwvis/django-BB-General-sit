# version: "3.9"

services:
  postgres-bb:
    container_name: postgres-bb
    image: docker.arvancloud.ir/postgres:16
    # restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres-bb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: tt123456
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis-bb:
    container_name: redis-bb
    image: docker.arvancloud.ir/redis
    # restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    depends_on:
      - postgres-bb

  backend-bb:
    build: .
    container_name: backend-bb
    command: sh -c "python manage.py collectstatic --noinput && gunicorn core.wsgi --bind 0.0.0.0:8000 --reload"
    volumes:
      - ./core:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000"
    environment:
      - SECRET_KEY=test
      - DEBUG=True
      - CELERY_BROKER_URL=redis://redis-bb:6379/0
      - DB_NAME=postgres-bb
      - DB_USER=admin
      - DB_PASSWORD=tt123456
      - DB_HOST=postgres-bb
      - DB_PORT=5432
    depends_on:
      - redis-bb
      - postgres-bb

  celery-worker:
    build: .
    container_name: celery-worker-bb
    command: watchmedo auto-restart --directory=./ --pattern=*.py --recursive -- celery -A core worker --loglevel=info
    volumes:
      - ./core:/app
    environment:
      - SECRET_KEY=test
      - CELERY_BROKER_URL=redis://redis-bb:6379/0
      - DB_NAME=postgres-bb
      - DB_USER=admin
      - DB_PASSWORD=tt123456
      - DB_HOST=postgres-bb
      - DB_PORT=5432
    depends_on:
      - redis-bb
      - postgres-bb

  celery-beat:
    build: .
    container_name: celery-beat-bb
    command: watchmedo auto-restart --directory=./ --pattern=*.py --recursive -- celery -A core beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./core:/app
    environment:
      - SECRET_KEY=test
      - CELERY_BROKER_URL=redis://redis-bb:6379/0
      - DB_NAME=postgres-bb
      - DB_USER=admin
      - DB_PASSWORD=tt123456
      - DB_HOST=postgres-bb
      - DB_PORT=5432
    depends_on:
      - redis-bb
      - postgres-bb
  nginx:
    image: docker.arvancloud.ir/nginx
    container_name: nginx
    restart: always 
    ports:
     - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
     - redis-bb
     - backend-bb

volumes:
    postgres_data:
    static_volume:
    media_volume: